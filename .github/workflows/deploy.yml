name: Deploy to Lightsail

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy to Lightsail
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts

          # Deploy backend via SSH
          ssh ubuntu@$SERVER_IP << 'ENDSSH'
            set -e

            # Set up environment
            export PATH=$PATH:/usr/local/go/bin

            # Navigate to project repository
            cd /home/ubuntu/walkermartin-practical5 || exit 1

            # Pull latest code
            echo "Pulling latest code from repository..."
            git pull origin main

            # Navigate to backend deployment directory
            cd /home/ubuntu/backend

            # Copy backend files from repo
            echo "Copying backend files..."
            cp -r /home/ubuntu/walkermartin-practical5/backend/* .

            # Build backend
            echo "Building Go backend..."
            go build -o sec-baseball-api

            # Restart backend service
            echo "Restarting backend service..."
            sudo systemctl restart sec-baseball

            # Check service status
            sudo systemctl status sec-baseball --no-pager

            echo "Backend deployment complete!"
          ENDSSH

          # Deploy frontend files
          echo "Deploying frontend files..."
          scp -i ~/.ssh/id_rsa -r frontend/dist/* ubuntu@$SERVER_IP:/tmp/frontend-dist/

          ssh ubuntu@$SERVER_IP << 'ENDSSH'
            # Move frontend files to web root
            sudo rm -rf /var/www/html/*
            sudo mv /tmp/frontend-dist/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html
            rm -rf /tmp/frontend-dist

            echo "Frontend deployment complete!"
          ENDSSH

          echo "Deployment complete!"
